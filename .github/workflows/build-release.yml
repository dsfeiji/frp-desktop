name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"
  FRP_VERSION: "0.67.0"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build app (macOS)
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -clean -platform darwin/arm64

      - name: Bundle frpc (macOS arm64)
        run: |
          set -euo pipefail
          curl -fL -o frp_arm64.tar.gz "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_darwin_arm64.tar.gz"
          tar -xzf frp_arm64.tar.gz
          cp "frp_${FRP_VERSION}_darwin_arm64/frpc" "build/bin/frp-desktop.app/Contents/MacOS/frpc"
          chmod +x "build/bin/frp-desktop.app/Contents/MacOS/frpc"
          codesign --force --deep --sign - --timestamp=none "build/bin/frp-desktop.app"

      - name: Create DMG
        run: |
          mkdir -p release/macos
          hdiutil create -volname "frp-desktop" -srcfolder "build/bin/frp-desktop.app" -ov -format UDZO "release/macos/frp-desktop-macos-arm64.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-desktop-macos-arm64
          path: release/macos/frp-desktop-macos-arm64.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build app (Windows)
        shell: powershell
        run: |
          $env:PATH = "$HOME\go\bin;$env:PATH"
          wails build -clean -platform windows/amd64

      - name: Bundle frpc (Windows amd64)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/fatedier/frp/releases/download/v${env:FRP_VERSION}/frp_${env:FRP_VERSION}_windows_amd64.zip" -OutFile "frp_windows_amd64.zip"
          Expand-Archive -Path "frp_windows_amd64.zip" -DestinationPath "."
          Copy-Item "frp_${env:FRP_VERSION}_windows_amd64\frpc.exe" "build\bin\frpc.exe" -Force

      - name: Package zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path release\windows -Force | Out-Null
          Copy-Item build\bin\frp.exe release\windows\frp-desktop-windows-amd64.exe -Force
          Compress-Archive -Path build\bin\frp.exe,build\bin\frpc.exe -DestinationPath release\windows\frp-desktop-windows-amd64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-desktop-windows-amd64
          path: |
            release/windows/frp-desktop-windows-amd64.exe
            release/windows/frp-desktop-windows-amd64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/frp-desktop-macos-arm64/frp-desktop-macos-arm64.dmg
            dist/frp-desktop-windows-amd64/frp-desktop-windows-amd64.exe
            dist/frp-desktop-windows-amd64/frp-desktop-windows-amd64.zip
